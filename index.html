<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Web</title>
    <style>
        *{

margin:0;
padding:0;
        }


        body {
            margin: 0;
            background: red;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            cursor: crosshair;
            overflow: hidden;
            height: 100vh;
        }
.menu{
        

display: flex;
 gap:0.8px;
width:100%
}



        .mau {
            flex:1;
            margin:0;
            border: 1.5px solid #00cc44;
            background: #87CEFA;
            padding:20px 60px;
            color: black;
            cursor: pointer;
            font-weight: bold;
            border-radius: 0px;
            transition: 0.3s;
            font-size:13px;
        }
        .mau:hover {
            background: darkred
        }
        .cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: hotpink;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            animation: fadeOut 0.8s forwards;
        }
        @keyframes fadeOut {
            to {
                transform: translate(-50%, -50%) scale(3);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class ="menu">
        <button class="mau" onclick="window.location.reload();">🏠LHS HOME</button>
     <button class="mau"> ĐĂNG KÍ</button>
            <button class="mau"> ĐĂNG NHẬP</button>
    </div>
    <script>        function createDot(x, y) {
            const dot = document.createElement("div");
            dot.className = "cursor-dot";
            dot.style.left = x + "px";
            dot.style.top = y + "px";
            document.body.appendChild(dot);
            setTimeout(() => {
                dot.remove();
            }, 800);
        }
        document.addEventListener("mousemove", function(e) {
            createDot(e.clientX, e.clientY);
        });
        document.addEventListener("touchmove", function(e) {
            const touch = e.touches[0];
            createDot(touch.clientX, touch.clientY);
        }, { passive: true });
    </script>
</body>
</html>
