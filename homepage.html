
<!DOCTYPE html>
<html>
<head>
<title>Game Bắn Súng Mini</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

#score {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 20px;
}

#target {
  width: 50px;
  height: 50px;
  background: red;
  border-radius: 50%;
  position: absolute;
  cursor: crosshair;
}
</style>
</head>

<body>

<div id="score">Điểm: 0</div>
<div id="target"></div>

<script>
let score = 0;
let target = document.getElementById("target");
let scoreText = document.getElementById("score");

function moveTarget() {
    let x = Math.random() * (window.innerWidth - 50);
    let y = Math.random() * (window.innerHeight - 50);

    target.style.left = x + "px";
    target.style.top = y + "px";
}

target.addEventListener("click", function() {
    score++;
    scoreText.innerText = "Điểm: " + score;
    moveTarget();
});

moveTarget();
</script>

</body>
</html>
